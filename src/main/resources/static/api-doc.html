<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华尔街之眼 — API 文档</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; }
        .layout { display: flex; min-height: 100vh; }
        /* 侧边栏 */
        .sidebar {
            width: 280px; background: #fff; border-right: 1px solid #d0d7de;
            position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; padding: 16px 0; z-index: 10;
        }
        .sidebar h2 { font-size: 15px; padding: 8px 20px; color: #1f2328; }
        .sidebar .doc-switcher { padding: 4px 16px 12px; border-bottom: 1px solid #d0d7de; margin-bottom: 8px; }
        .sidebar .doc-switcher select {
            width: 100%; padding: 6px 8px; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 13px; background: #f6f8fa; cursor: pointer;
        }
        .sidebar a {
            display: block; padding: 5px 20px; font-size: 13px; color: #656d76;
            text-decoration: none; line-height: 1.6; transition: all .15s;
        }
        .sidebar a:hover { color: #0969da; background: #f6f8fa; }
        .sidebar a.active { color: #0969da; font-weight: 600; background: #ddf4ff; border-right: 3px solid #0969da; }
        .sidebar a.h2-link { padding-left: 20px; font-weight: 600; color: #1f2328; }
        .sidebar a.h3-link { padding-left: 36px; }
        /* 主内容 */
        .main { margin-left: 280px; flex: 1; padding: 32px 48px; max-width: 960px; }
        .markdown-body { background: #fff; padding: 32px 40px; border-radius: 8px; border: 1px solid #d0d7de; }
        .markdown-body h1 { border-bottom: 2px solid #d0d7de; padding-bottom: 12px; }
        .markdown-body h2 { margin-top: 32px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
        .markdown-body pre { background: #f6f8fa; border-radius: 6px; }
        .markdown-body table { display: table; width: 100%; }
        .markdown-body table th { background: #f6f8fa; }
        /* 回到顶部 */
        .back-top {
            position: fixed; bottom: 32px; right: 32px; width: 40px; height: 40px;
            background: #0969da; color: #fff; border: none; border-radius: 50%;
            cursor: pointer; font-size: 18px; display: none; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }
        .back-top.show { display: flex; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <h2>📄 API 文档</h2>
            <div class="doc-switcher">
                <select id="docSelect">
                    <option value="frontend">前端对接文档</option>
                    <option value="spec">完整 API Spec</option>
                </select>
            </div>
            <div id="toc"></div>
        </nav>
        <main class="main">
            <article id="content" class="markdown-body"></article>
        </main>
    </div>
    <button class="back-top" id="backTop" title="回到顶部">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const docs = {
            frontend: `/docs/api-frontend`,
            spec: `/docs/api-spec`
        };

        const tocEl = document.getElementById('toc');
        const contentEl = document.getElementById('content');
        const docSelect = document.getElementById('docSelect');
        const backTop = document.getElementById('backTop');

        async function loadDoc(key) {
            try {
                const res = await fetch(docs[key]);
                if (!res.ok) throw new Error(res.status);
                const md = await res.text();
                contentEl.innerHTML = marked.parse(md);
                buildToc();
                window.scrollTo(0, 0);
            } catch (e) {
                contentEl.innerHTML = `<p style="color:red">加载失败: ${e.message}。请确认后端已启动。</p>`;
            }
        }

        function buildToc() {
            const headings = contentEl.querySelectorAll('h1, h2, h3');
            tocEl.innerHTML = '';
            headings.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                const a = document.createElement('a');
                a.href = '#' + id;
                a.textContent = h.textContent;
                a.className = h.tagName.toLowerCase() + '-link';
                a.addEventListener('click', e => {
                    e.preventDefault();
                    h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                });
                tocEl.appendChild(a);
            });
        }

        // 滚动高亮 TOC
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const headings = contentEl.querySelectorAll('[id^="heading-"]');
                    let current = null;
                    headings.forEach(h => {
                        if (h.getBoundingClientRect().top <= 80) current = h;
                    });
                    if (current) {
                        document.querySelectorAll('.sidebar a').forEach(a => {
                            a.classList.toggle('active', a.getAttribute('href') === '#' + current.id);
                        });
                    }
                    backTop.classList.toggle('show', window.scrollY > 300);
                    ticking = false;
                });
                ticking = true;
            }
        });

        backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        docSelect.addEventListener('change', () => loadDoc(docSelect.value));

        // 初始加载
        loadDoc('frontend');
    </script>
</body>
</html>
