<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华尔街之眼 — 投资画像设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#0a0e27;color:#e0e0e0;min-height:100vh;padding-bottom:40px}
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#0a0e27;border-bottom:1px solid #1a1f4e}
.nav-back{background:none;border:none;color:#e0e0e0;font-size:20px;cursor:pointer;padding:4px 8px}
.nav-title{font-size:17px;font-weight:600;color:#e0e0e0}
.nav-save{background:none;border:none;color:#1A73E8;font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px}
.nav-save:disabled{color:#4a5080;cursor:not-allowed}
.banner{margin:12px 16px;padding:20px;background:linear-gradient(135deg,#1A73E8,#1565C0);border-radius:12px}
.banner h2{font-size:18px;color:#fff;margin-bottom:6px}
.banner p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.5}
.section{margin:12px 16px;background:#151a40;border:1px solid #1e2555;border-radius:12px;padding:20px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.section-header .icon{font-size:18px}
.section-header h3{font-size:16px;font-weight:600;color:#e0e0e0}
.section-header .hint{margin-left:auto;font-size:12px;color:#1A73E8}
.label{font-size:14px;color:#8890b5;margin-bottom:10px}
</style>
</head>
<body>
<div class="nav">
  <button class="nav-back" onclick="goBack()">←</button>
  <span class="nav-title">投资画像设置</span>
  <button class="nav-save" id="saveBtn" onclick="saveProfile()">保存</button>
</div>
<div class="banner">
  <h2>定制你的专属投研情报</h2>
  <p>完善你的投资画像，我们将为你提供更精准的情报筛选和个性化分析</p>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="holdingModal">
  <div class="modal">
    <h3>添加持仓</h3>
    <div class="form-group"><label>股票代码</label><input type="text" id="inputStockCode" placeholder="如 NVDA、AAPL" maxlength="10"></div>
    <div class="form-group"><label>公司名称</label><input type="text" id="inputStockName" placeholder="如 NVIDIA Corporation" maxlength="50"></div>
    <div class="form-group"><label>持仓占比 (%)</label><input type="number" id="inputRatio" placeholder="如 40" min="0" max="100" step="1"></div>
    <div class="form-group"><label>成本价 ($)</label><input type="number" id="inputCost" placeholder="如 320" min="0" step="0.01"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmAddHolding()">确认添加</button>
    </div>
  </div>
</div>
<style>
.option-group{display:flex;gap:10px;margin-bottom:18px}
.option-item{flex:1;text-align:center;padding:12px 8px;background:#0a0e27;border:1.5px solid #2a3070;border-radius:10px;cursor:pointer;transition:all .2s}
.option-item.active{border-color:#1A73E8;background:rgba(26,115,232,.15)}
.option-item .opt-label{font-size:14px;color:#e0e0e0;display:block}
.option-item .opt-desc{font-size:11px;color:#6b7280;margin-top:3px;display:block}
.option-item.active .opt-label{color:#1A73E8;font-weight:600}
.option-item.active .opt-desc{color:#1A73E8}
.tags-wrap{display:flex;flex-wrap:wrap;gap:10px}
.tag{padding:8px 16px;background:#0a0e27;border:1.5px solid #2a3070;border-radius:20px;font-size:13px;color:#8890b5;cursor:pointer;transition:all .2s;user-select:none}
.tag.active{border-color:#1A73E8;background:rgba(26,115,232,.15);color:#1A73E8}
.tag.add-custom{border-style:dashed;color:#1A73E8;border-color:#1A73E8}
.holding-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid #1e2555}
.holding-item:last-child{border-bottom:none}
.holding-code{font-size:15px;font-weight:700;color:#ffd700;font-family:'DIN Alternate','Roboto Mono',monospace;width:56px}
.holding-info{flex:1;margin-left:12px}
.holding-name{font-size:14px;color:#e0e0e0}
.holding-meta{font-size:12px;color:#6b7280;margin-top:2px}
.holding-del{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;padding:6px 8px;opacity:.7;transition:opacity .2s}
.holding-del:hover{opacity:1}
.add-holding-btn{display:flex;align-items:center;gap:6px;padding:12px 0;color:#1A73E8;font-size:14px;cursor:pointer;background:none;border:none;width:100%}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{width:100%;max-width:500px;background:#151a40;border-radius:16px 16px 0 0;padding:24px 20px 32px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:16px;color:#e0e0e0;margin-bottom:20px;text-align:center}
.modal .form-group{margin-bottom:16px}
.modal .form-group label{display:block;font-size:13px;color:#8890b5;margin-bottom:6px}
.modal .form-group input{width:100%;padding:11px 14px;background:#0a0e27;border:1px solid #2a3070;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none}
.modal .form-group input:focus{border-color:#1A73E8}
.modal .form-group input::placeholder{color:#4a5080}
.modal-btns{display:flex;gap:12px;margin-top:20px}
.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.btn-cancel{background:#0a0e27;color:#8890b5;border:1px solid #2a3070!important}
.btn-confirm{background:linear-gradient(135deg,#1A73E8,#1565C0);color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#00C9A7;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:300;transition:transform .3s ease}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#ef4444}
</style>
<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/login.html';
const HEADERS = {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN};
let state = {investorType:null,investmentCycle:null,focusAreas:[],holdings:[],focusOptions:[]};

async function init(){
  try{
    const [pRes,oRes] = await Promise.all([
      fetch('/api/profile',{headers:HEADERS}),
      fetch('/api/profile/focus-options',{headers:HEADERS})
    ]);
    if(pRes.status===401||oRes.status===401){window.location.href='/login.html';return;}
    const pd = await pRes.json(), od = await oRes.json();
    if(pd.data){
      state.investorType=pd.data.investorType;
      state.investmentCycle=pd.data.investmentCycle;
      state.focusAreas=pd.data.focusAreas||[];
      state.holdings=pd.data.holdings||[];
    }
    state.focusOptions=od.data||[];
    render();
  }catch(e){console.error(e);showToast('加载失败',true);}
}

function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  document.getElementById('app').innerHTML = renderBasicInfo()+renderFocusAreas()+renderHoldings();
}

function renderBasicInfo(){
  const types=[{key:'conservative',label:'保守型',desc:'低风险'},{key:'balanced',label:'稳健型',desc:'中等风险'},{key:'growth',label:'进取型',desc:'高风险'}];
  const cycles=[{key:'short',label:'短线',desc:'持有<1个月'},{key:'medium',label:'中线',desc:'持有1-6个月'},{key:'long',label:'长线',desc:'持有>6个月'}];
  return '<div class="section"><div class="section-header"><span class="icon">👤</span><h3>基本信息</h3></div>'
    +'<div class="label">风险偏好</div><div class="option-group">'
    +types.map(t=>'<div class="option-item '+(state.investorType===t.key?'active':'')+'" onclick="selectType(\''+t.key+'\')"><span class="opt-label">'+t.label+'</span><span class="opt-desc">'+t.desc+'</span></div>').join('')
    +'</div><div class="label">投资周期</div><div class="option-group">'
    +cycles.map(c=>'<div class="option-item '+(state.investmentCycle===c.key?'active':'')+'" onclick="selectCycle(\''+c.key+'\')"><span class="opt-label">'+c.label+'</span><span class="opt-desc">'+c.desc+'</span></div>').join('')
    +'</div></div>';
}
</script>
<script>
function renderFocusAreas(){
  var opts = state.focusOptions.length>0 ? state.focusOptions : [{name:'AI芯片'},{name:'云计算'},{name:'半导体'},{name:'大模型'},{name:'AIGC应用'},{name:'自动驾驶'},{name:'机器人'},{name:'量子计算'},{name:'生物科技'},{name:'新能源'}];
  return '<div class="section"><div class="section-header"><span class="icon">◇</span><h3>关注领域</h3><span class="hint">最多选择8个</span></div><div class="tags-wrap">'
    +opts.map(function(o){return '<span class="tag '+(state.focusAreas.includes(o.name)?'active':'')+'" onclick="toggleFocus(\''+esc(o.name)+'\')">'+esc(o.name)+'</span>';}).join('')
    +'<span class="tag add-custom" onclick="addCustomFocus()">+ 添加自定义</span></div></div>';
}

function renderHoldings(){
  var html='<div class="section"><div class="section-header"><span class="icon">📦</span><h3>我的持仓</h3><span class="hint" style="cursor:pointer;font-size:20px" onclick="openModal()">+</span></div>';
  if(state.holdings.length===0) html+='<div style="text-align:center;color:#4a5080;padding:20px;font-size:13px">暂无持仓，点击 + 添加</div>';
  state.holdings.forEach(function(h){
    var meta='';
    if(h.positionRatio) meta+='持仓占比: '+h.positionRatio+'%';
    if(h.positionRatio&&h.costPrice) meta+=' · ';
    if(h.costPrice) meta+='成本价: $'+h.costPrice;
    html+='<div class="holding-item"><span class="holding-code">'+esc(h.stockCode)+'</span><div class="holding-info"><div class="holding-name">'+esc(h.stockName||h.stockCode)+'</div><div class="holding-meta">'+meta+'</div></div><button class="holding-del" onclick="removeHolding(\''+esc(h.stockCode)+'\')">🗑</button></div>';
  });
  html+='<button class="add-holding-btn" onclick="openModal()">+ 添加持仓</button></div>';
  return html;
}

function selectType(k){state.investorType=k;render();}
function selectCycle(k){state.investmentCycle=k;render();}
function toggleFocus(name){
  var i=state.focusAreas.indexOf(name);
  if(i>=0){state.focusAreas.splice(i,1);}
  else{if(state.focusAreas.length>=8){showToast('最多选择8个关注领域',true);return;}state.focusAreas.push(name);}
  render();
}
function addCustomFocus(){
  var name=prompt('输入自定义关注领域:');
  if(name&&name.trim()){
    if(state.focusAreas.length>=8){showToast('最多选择8个',true);return;}
    var t=name.trim();
    if(!state.focusAreas.includes(t)){state.focusAreas.push(t);if(!state.focusOptions.find(function(o){return o.name===t;}))state.focusOptions.push({id:t,name:t});}
    render();
  }
}
</script>
<script>
function openModal(){
  document.getElementById('holdingModal').classList.add('show');
  document.getElementById('inputStockCode').value='';
  document.getElementById('inputStockName').value='';
  document.getElementById('inputRatio').value='';
  document.getElementById('inputCost').value='';
  setTimeout(function(){document.getElementById('inputStockCode').focus();},100);
}
function closeModal(){document.getElementById('holdingModal').classList.remove('show');}

async function confirmAddHolding(){
  var code=document.getElementById('inputStockCode').value.trim().toUpperCase();
  var name=document.getElementById('inputStockName').value.trim();
  var ratio=document.getElementById('inputRatio').value;
  var cost=document.getElementById('inputCost').value;
  if(!code){showToast('请输入股票代码',true);return;}
  try{
    var res=await fetch('/api/profile/holdings',{method:'POST',headers:HEADERS,body:JSON.stringify({stockCode:code,stockName:name||code,positionRatio:ratio?parseFloat(ratio):null,costPrice:cost?parseFloat(cost):null})});
    if(!res.ok){var d=await res.json();showToast(d.message||'添加失败',true);return;}
    var newH={stockCode:code,stockName:name||code,positionRatio:ratio?parseFloat(ratio):null,costPrice:cost?parseFloat(cost):null};
    var idx=state.holdings.findIndex(function(h){return h.stockCode===code;});
    if(idx>=0)state.holdings[idx]=newH;else state.holdings.push(newH);
    closeModal();render();showToast('持仓添加成功');
  }catch(e){showToast('网络错误',true);}
}

async function removeHolding(stockCode){
  if(!confirm('确认删除 '+stockCode+' ?'))return;
  try{
    await fetch('/api/profile/holdings/'+encodeURIComponent(stockCode),{method:'DELETE',headers:HEADERS});
    state.holdings=state.holdings.filter(function(h){return h.stockCode!==stockCode;});
    render();showToast('已删除');
  }catch(e){showToast('删除失败',true);}
}

async function saveProfile(){
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='保存中...';
  try{
    var res=await fetch('/api/profile',{method:'PUT',headers:HEADERS,body:JSON.stringify({investorType:state.investorType,investmentCycle:state.investmentCycle,focusAreas:state.focusAreas})});
    if(!res.ok){var d=await res.json();showToast(d.message||'保存失败',true);return;}
    showToast('画像保存成功');
    setTimeout(function(){window.location.href='/index.html';},800);
  }catch(e){showToast('网络错误',true);}
  finally{btn.disabled=false;btn.textContent='保存';}
}

function goBack(){history.back();}
function showToast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isErr?' error':'');
  setTimeout(function(){t.className='toast';},2500);
}

init();
</script>
</body>
</html>
