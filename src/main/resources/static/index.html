<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华尔街之眼 - 调试面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0e27;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1f4e,#0d1333);padding:20px 30px;border-bottom:1px solid #2a3070;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;color:#ffd700;letter-spacing:1px}
.stats{display:flex;gap:20px;font-size:13px;color:#8890b5}
.stats span{background:#151a40;padding:6px 14px;border-radius:20px;border:1px solid #2a3070}
.container{max-width:1200px;margin:20px auto;padding:0 20px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:10px 20px;background:#151a40;border:1px solid #2a3070;border-radius:8px 8px 0 0;cursor:pointer;color:#8890b5;font-size:14px;transition:all .2s}
.tab.active{background:#1e2555;color:#ffd700;border-bottom-color:#1e2555}
.panel{display:none;background:#1e2555;border:1px solid #2a3070;border-radius:0 8px 8px 8px;padding:24px}
.panel.active{display:block}
</style>
</head>
<body>
<div class="header">
<h1>🏛️ 华尔街之眼 — 调试面板</h1>
<div class="stats">
<span id="statNews">新闻: -</span>
<span id="statVector">向量: -</span>
<span id="statMarket">行情: -</span>
</div>
</div>
<div class="container">
<div class="tabs">
<div class="tab active" onclick="switchTab('collect')">📡 数据采集</div>
<div class="tab" onclick="switchTab('news')">📰 新闻列表</div>
<div class="tab" onclick="switchTab('intel')">🔍 情报中心</div>
<div class="tab" onclick="switchTab('query')">🤖 智能问答</div>
<div class="tab" onclick="switchTab('market')">📈 行情数据</div>
<div class="tab" onclick="switchTab('logs')">📋 实时日志</div>
</div>
<div id="panel-collect" class="panel active"></div>
<div id="panel-news" class="panel"></div>
<div id="panel-intel" class="panel"></div>
<div id="panel-query" class="panel"></div>
<div id="panel-market" class="panel"></div>
<div id="panel-logs" class="panel"></div>
</div>
<script src="app.js"></script>
</body>
</html>
