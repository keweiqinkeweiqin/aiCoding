<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华尔街之眼</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css">
<script src="https://unpkg.com/vue@3.3.13/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4.2.5/dist/vue-router.global.prod.js"></script>
<script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.min.js"></script>
<script src="https://unpkg.com/element-plus@2.4.4/dist/locale/zh-cn.min.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#1A73E8;--c1l:#e8f0fe;--bg:#f7f8fa;--t1:#323233;--t2:#646566;--t3:#969799;--bd:#ebedf0;--r:12px;--pw:420px}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#ededed;color:var(--t1);font-size:14px;display:flex;justify-content:center;height:100vh;overflow:hidden}
.shell{width:var(--pw);max-width:100vw;height:100vh;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden}
.sbar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border-bottom:.5px solid var(--bd);flex-shrink:0}
.nbar{height:44px;background:#fff;display:flex;align-items:center;padding:0 14px;border-bottom:.5px solid var(--bd);flex-shrink:0}
.nbar .back{font-size:18px;cursor:pointer;padding:4px 8px 4px 0}
.nbar .ntitle{flex:1;text-align:center;font-size:15px;font-weight:600;margin-right:28px}
.pg{flex:1;overflow-y:auto;padding:12px 12px 72px;-webkit-overflow-scrolling:touch}
.pg2{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.tbar{height:56px;background:#fff;display:flex;align-items:center;justify-content:space-around;position:absolute;bottom:0;left:0;right:0;z-index:200;border-top:.5px solid var(--bd)}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 0;text-decoration:none;color:var(--t3);font-size:10px}
.ti .ico{font-size:22px;line-height:1}.ti.on{color:var(--c1)}
.cd{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px}
.cdt{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:500}
.ititle{font-size:15px;font-weight:600;line-height:1.5;margin:8px 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.isum{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.ifooter{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--t3)}
.tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;background:var(--c1l);color:var(--c1);margin:2px}
.stag{background:#fff5f5;color:#ee0a24}
.cbar{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t3)}
.cbar .b{width:50px;height:3px;background:#eee;border-radius:2px;overflow:hidden}.cbar .bf{height:100%;border-radius:2px}
.pills{display:flex;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none}.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:13px;background:#fff;color:var(--t2);border:1px solid var(--bd);cursor:pointer}
.pill.on{background:var(--c1);color:#fff;border-color:var(--c1)}
.btn{display:inline-flex;align-items:center;justify-content:center;height:36px;border-radius:18px;font-size:13px;font-weight:500;cursor:pointer;border:none;padding:0 20px}
.btn:active{opacity:.7}.btn1{background:var(--c1);color:#fff}.btn0{background:#f2f3f5;color:var(--t1)}
.btns{height:28px;font-size:12px;padding:0 12px;border-radius:14px}.btnw{width:100%}
.mono{font-family:'DIN Alternate','Roboto Mono',monospace}
.up{color:#ee0a24}.dn{color:#07c160}
.aip{background:linear-gradient(135deg,#f0f5ff,#e8f4fd);border-radius:var(--r);padding:14px;margin-top:12px}
.ais{padding:10px 0;border-bottom:.5px solid rgba(0,0,0,.06)}.ais:last-child{border-bottom:none}
.aist{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.aisb{font-size:13px;line-height:1.7;color:var(--t2)}
.rpill{padding:6px 16px;border-radius:20px;font-size:13px;background:#f7f8fa;color:var(--t2);cursor:pointer;border:1px solid transparent;display:inline-block;margin:0 4px 4px 0}
.rpill.on{background:var(--c1l);color:var(--c1);border-color:var(--c1)}
.hitem{display:flex;align-items:center;padding:10px 0;border-bottom:.5px solid var(--bd)}.hitem:last-child{border-bottom:none}
.hrank{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:10px;flex-shrink:0}
.hrank.top{background:var(--c1);color:#fff}.hrank.nm{background:#f2f3f5;color:#969799}
.drow{display:flex;align-items:center;padding:10px 0;border-bottom:.5px solid var(--bd)}.drow:last-child{border-bottom:none}
.sk{background:linear-gradient(90deg,#f2f3f5 25%,#e8e8e8 50%,#f2f3f5 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px;height:13px;margin-bottom:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:40px 0;color:var(--t3);font-size:13px}
.inp{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--c1)}
</style>
</head>
<body>

<!-- ===== APP TEMPLATE ===== -->
<template id="tpl-app">
<div class="shell">
  <div class="sbar">{{tt}}</div>
  <div class="nbar" v-if="sb"><div class="back" @click="goBack">‹ 返回</div><div class="ntitle">{{tt}}</div></div>
  <div :class="sb?'pg2':'pg'"><router-view></router-view></div>
  <div class="tbar" v-if="st">
    <router-link to="/" class="ti" :class="{on:rt==='Home'}"><span class="ico">📰</span><span>情报</span></router-link>
    <router-link to="/trends" class="ti" :class="{on:rt==='Trends'}"><span class="ico">📈</span><span>趋势</span></router-link>
    <router-link to="/analysis" class="ti" :class="{on:rt==='Analysis'}"><span class="ico">🤖</span><span>研判</span></router-link>
    <router-link to="/sentiment" class="ti" :class="{on:rt==='Sent'}"><span class="ico">🎭</span><span>情绪</span></router-link>
    <router-link to="/profile" class="ti" :class="{on:rt==='Profile'}"><span class="ico">👤</span><span>我的</span></router-link>
  </div>
</div>
</template>


<!-- ===== HOME TEMPLATE ===== -->
<template id="tpl-home">
<div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <div style="flex:1;background:#fff;border-radius:20px;padding:8px 14px;display:flex;align-items:center;gap:6px">
      <span style="color:#ccc">🔍</span>
      <input v-model="kw" @keyup.enter="load" placeholder="搜索情报..." style="border:none;outline:none;flex:1;font-size:13px;background:transparent">
    </div>
    <button class="btn btn1 btns" @click="load">搜索</button>
  </div>
  <div class="pills">
    <span class="pill" :class="{on:!sf}" @click="sf='';load()">全部</span>
    <span class="pill" :class="{on:sf==='NEWS'}" @click="tsf('NEWS')">📰 新闻</span>
    <span class="pill" :class="{on:sf==='SOCIAL'}" @click="tsf('SOCIAL')">💬 社交</span>
    <span class="pill" :class="{on:sf==='MARKET_DATA'}" @click="tsf('MARKET_DATA')">📈 行情</span>
  </div>
  <div class="pills" style="padding-top:0">
    <span v-for="t in tags" :key="t" class="pill" :class="{on:tf===t}" @click="ttf(t)">{{t}}</span>
  </div>
  <div class="cd" style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer" @click="$router.push('/sentiment')">
    <div ref="mg" style="width:60px;height:60px;flex-shrink:0"></div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600">市场情绪：{{sent.level}}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">较昨日 <span :style="{color:sent.changeFromYesterday>=0?'#ee0a24':'#07c160',fontWeight:'600'}">{{sent.changeFromYesterday>=0?'+':''}}{{sent.changeFromYesterday}}</span></div>
    </div>
    <span style="color:#ccc;font-size:16px">›</span>
  </div>
  <template v-if="loading"><div v-for="i in 3" :key="i" class="cd"><div class="sk" style="width:40%"></div><div class="sk" style="margin-top:10px"></div><div class="sk" style="width:80%"></div></div></template>
  <div v-for="item in list" :key="item.id" class="cd" style="cursor:pointer" @click="$router.push('/intel/'+item.id)">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span class="badge" :style="{background:cc(item.credibility)}">{{ci(item.credibility)}} {{cl(item.credibility)}}</span>
      <div class="cbar"><div class="b"><div class="bf" :style="{width:(item.confidenceScore*100)+'%',background:cfc(item.confidenceScore)}"></div></div><span class="mono">{{item.confidenceScore.toFixed(2)}}</span></div>
    </div>
    <div class="ititle">{{item.title}}</div>
    <div class="isum">{{item.summary}}</div>
    <div style="display:flex;flex-wrap:wrap;gap:2px">
      <span v-for="s in pj(item.relatedStocks).slice(0,3)" :key="s" class="tag stag mono">{{s}}</span>
      <span v-for="t in pj(item.tags).slice(0,2)" :key="t" class="tag">{{t}}</span>
    </div>
    <div class="ifooter" style="margin-top:8px">
      <span>{{item.sourceName}} · {{ta(item.publishedAt)}}</span>
      <span v-if="item.verified" style="color:#07c160">✅已验证</span>
      <span v-else style="color:#ff976a">⚠️待验证</span>
    </div>
  </div>
  <div v-if="!loading&&list.length===0" class="empty">📭 暂无情报数据</div>
</div>
</template>

<!-- ===== DETAIL TEMPLATE ===== -->
<template id="tpl-detail">
<div v-if="item">
  <div class="cd">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span class="badge" :style="{background:cc(item.credibility)}">{{ci(item.credibility)}} {{cl(item.credibility)}}</span>
      <span v-if="item.verified" style="font-size:12px;color:#07c160">✅已验证</span>
      <span v-else style="font-size:12px;color:#ff976a">⚠️待验证</span>
    </div>
    <div style="font-size:18px;font-weight:700;line-height:1.5;margin-bottom:10px">{{item.title}}</div>
    <div class="cbar" style="margin-bottom:10px"><span>置信度</span><div class="b" style="width:80px"><div class="bf" :style="{width:(item.confidenceScore*100)+'%',background:cfc(item.confidenceScore)}"></div></div><span class="mono" style="font-weight:600">{{item.confidenceScore.toFixed(2)}}</span></div>
    <div style="font-size:12px;color:var(--t3);display:flex;flex-direction:column;gap:4px;padding:8px 0;border-bottom:.5px solid var(--bd);margin-bottom:10px">
      <span>📰 来源：{{item.sourceName}}</span>
      <span>⏰ {{fd(item.publishedAt)}}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:10px">
      <span v-for="s in pj(item.relatedStocks)" :key="s" class="tag stag mono">{{s}}</span>
      <span v-for="t in pj(item.tags)" :key="t" class="tag">{{t}}</span>
    </div>
    <div style="font-size:14px;line-height:1.8;white-space:pre-wrap">{{item.content||item.summary}}</div>
  </div>
  <div class="aip">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:15px;font-weight:600">🤖 AI研判</span>
      <button class="btn btn1 btns" @click="gen">{{analysis?'🔄重新':'生成研判'}}</button>
    </div>
    <div v-if="prof.investmentStyle" style="font-size:11px;color:var(--t3);margin-bottom:8px">画像：{{SM[prof.investmentStyle]}} · {{pj(prof.focusAreas).join('、')}}</div>
    <div v-if="aiLoad" style="padding:16px 0;text-align:center"><div style="color:var(--c1);font-size:13px;margin-bottom:10px">🤖 分析中...</div><div class="sk"></div><div class="sk" style="width:80%"></div><div class="sk" style="width:60%"></div></div>
    <div v-else-if="analysis">
      <div class="ais"><div class="aist">📊 情报研判</div><div class="aisb">{{analysis.analysis}}</div></div>
      <div class="ais"><div class="aist">💼 影响评估</div><div v-for="imp in analysis.impacts" :key="imp.stock" class="aisb" style="margin-bottom:6px"><span style="font-weight:600;color:var(--c1)">{{imp.stock}}：</span>{{imp.impact}}</div></div>
      <div class="ais"><div class="aist">🎯 操作建议</div><div class="aisb" style="background:rgba(255,255,255,.6);padding:8px 10px;border-radius:8px">{{analysis.suggestion}}</div></div>
      <div class="ais"><div class="aist">⚠️ 风险提示</div><div class="aisb"><div v-for="(r,i) in analysis.risks" :key="i">{{i+1}}. {{r}}</div></div></div>
    </div>
    <div v-else class="empty" style="padding:20px 0">点击"生成研判"获取AI分析</div>
  </div>
</div>
<div v-else class="empty" style="padding-top:80px">⏳ 加载中...</div>
</template>


<!-- ===== TRENDS TEMPLATE ===== -->
<template id="tpl-trends">
<div>
  <div class="pills" style="padding-top:0">
    <span class="pill" :class="{on:days===7}" @click="days=7;load()">近7天</span>
    <span class="pill" :class="{on:days===30}" @click="days=30;load()">近30天</span>
    <span class="pill" :class="{on:days===90}" @click="days=90;load()">近90天</span>
  </div>
  <div class="cd"><div class="cdt">📈 板块热度趋势</div><div ref="hc" style="width:100%;height:260px"></div></div>
  <div class="cd"><div class="cdt">🏆 个股关注度 TOP10</div>
    <div v-for="(s,i) in top" :key="s.code" class="hitem">
      <span class="hrank" :class="i<3?'top':'nm'">{{i+1}}</span>
      <div style="flex:1"><div style="font-size:14px;font-weight:600" class="mono">{{s.code}}</div><div style="font-size:11px;color:var(--t3)">{{s.name}}</div></div>
      <span style="font-size:11px;color:var(--t3);margin-right:12px">{{s.cnt}}次</span>
      <span class="mono" :class="s.chg>=0?'up':'dn'" style="font-size:13px;font-weight:600;min-width:50px;text-align:right">{{s.chg>=0?'+':''}}{{s.chg}}%</span>
    </div>
  </div>
  <div class="cd"><div class="cdt">📊 情报来源分布</div><div ref="sc" style="width:100%;height:220px"></div></div>
  <div class="cd"><div class="cdt">🔍 情报质量</div>
    <div class="drow"><span style="width:70px;font-size:12px;color:var(--t3)">🟢 权威</span><div style="flex:1;margin:0 10px"><el-progress :percentage="35" color="#07c160" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">35%</span></div>
    <div class="drow"><span style="width:70px;font-size:12px;color:var(--t3)">🟡 一般</span><div style="flex:1;margin:0 10px"><el-progress :percentage="48" color="#ff976a" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">48%</span></div>
    <div class="drow"><span style="width:70px;font-size:12px;color:var(--t3)">🔴 存疑</span><div style="flex:1;margin:0 10px"><el-progress :percentage="17" color="#ee0a24" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">17%</span></div>
    <div class="drow"><span style="width:70px;font-size:12px;color:var(--t3)">✅ 已验证</span><div style="flex:1;margin:0 10px"><el-progress :percentage="42" color="#1A73E8" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">42%</span></div>
  </div>
</div>
</template>

<!-- ===== SENTIMENT TEMPLATE ===== -->
<template id="tpl-sent">
<div>
  <div class="cd" style="text-align:center">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">AI/科技板块情绪指数</div>
    <div ref="gg" style="width:100%;height:200px"></div>
    <div style="display:flex;justify-content:center;gap:20px;font-size:12px;color:var(--t3)">
      <span>较昨日 <span :style="{color:s.changeFromYesterday>=0?'#ee0a24':'#07c160',fontWeight:'600'}">{{s.changeFromYesterday>=0?'+':''}}{{s.changeFromYesterday}}</span></span>
      <span>较上周 <span :style="{color:s.changeFromLastWeek>=0?'#ee0a24':'#07c160',fontWeight:'600'}">{{s.changeFromLastWeek>=0?'+':''}}{{s.changeFromLastWeek}}</span></span>
    </div>
  </div>
  <div class="cd"><div class="cdt">📊 情绪构成</div>
    <div class="drow"><span style="width:60px;font-size:12px;color:var(--t3)">📰 新闻</span><div style="flex:1;margin:0 10px"><el-progress :percentage="s.dimensions.newsSentiment*100" color="#1A73E8" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">{{(s.dimensions.newsSentiment*100).toFixed(0)}}%</span></div>
    <div class="drow"><span style="width:60px;font-size:12px;color:var(--t3)">💬 社交</span><div style="flex:1;margin:0 10px"><el-progress :percentage="s.dimensions.socialSentiment*100" color="#ff976a" :show-text="false" :stroke-width="6"></el-progress></div><span class="mono" style="font-size:13px;font-weight:600">{{(s.dimensions.socialSentiment*100).toFixed(0)}}%</span></div>
    <div class="drow"><span style="width:60px;font-size:12px;color:var(--t3)">📈 波动</span><div style="flex:1;font-size:13px;margin-left:10px">VIX: <span class="mono" style="font-weight:600">{{s.dimensions.volatility}}</span> (低波动)</div></div>
    <div class="drow"><span style="width:60px;font-size:12px;color:var(--t3)">📊 成交量</span><div style="flex:1;font-size:13px;margin-left:10px">较均值 <span class="mono up" style="font-weight:600">+{{(s.dimensions.volumeChange*100).toFixed(0)}}%</span> (活跃)</div></div>
  </div>
  <div class="cd"><div class="cdt">📉 情绪趋势</div><div ref="hh" style="width:100%;height:260px"></div></div>
  <div class="cd"><div class="cdt">🤖 AI情绪解读</div>
    <div style="font-size:13px;line-height:1.8;color:var(--t2)">当前市场处于"<span style="color:#43A047;font-weight:600">贪婪</span>"区间：<br>1. NVIDIA财报超预期带动AI板块乐观情绪<br>2. 多家科技巨头加大AI投资，预期上修<br>3. 社交媒体讨论热度创30天新高<br><br><span style="color:#ff976a">⚠️ 情绪指数超70后，短期回调概率约60%</span></div>
  </div>
</div>
</template>


<!-- ===== ANALYSIS TEMPLATE ===== -->
<template id="tpl-analysis">
<div>
  <div class="cd" style="display:flex;align-items:center;gap:10px;cursor:pointer" @click="$router.push('/profile')">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--c1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">👤</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600">{{SM[prof.investmentStyle]||'未设置画像'}}</div>
      <div style="font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{pj(prof.focusAreas).join(' · ')||'点击设置画像'}} · {{HM[prof.investmentHorizon]||''}}</div>
    </div>
    <span style="color:#ccc;font-size:16px">›</span>
  </div>
  <div v-if="prof.holdings&&prof.holdings.length" class="cd" style="padding:10px 14px">
    <div style="font-size:12px;color:var(--t3);margin-bottom:6px">💼 持仓</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span v-for="h in prof.holdings" :key="h.stockCode" class="tag stag mono" style="font-size:12px;padding:3px 10px">{{h.stockCode}} {{h.quantity}}股</span>
    </div>
  </div>
  <div v-if="!analysis&&!loading" style="text-align:center;padding:30px 0">

var SentView={template:'#tpl-sent',data:function(){return{s:{score:0,level:'',changeFromYesterday:0,changeFromLastWeek:0,dimensions:{newsSentiment:0,socialSentiment:0,volatility:0,volumeChange:0}},hist:{labels:[],scores:[]}}},methods:{rg:function(){var el=this.$refs.gg;if(!el)return;var ch=echarts.init(el),s=this.s,lc=s.score>55?'#43A047':'#E53935';ch.setOption({series:[{type:'gauge',min:0,max:100,splitNumber:4,radius:'85%',axisLine:{lineStyle:{width:16,color:[[.25,'#B71C1C'],[.45,'#E53935'],[.55,'#9E9E9E'],[.75,'#43A047'],[1,'#1B5E20']]}},pointer:{width:4,length:'55%'},axisTick:{show:false},splitLine:{length:10,lineStyle:{width:2}},axisLabel:{distance:18,fontSize:9,color:'#999',formatter:function(v){return{0:'极度恐慌',25:'恐慌',50:'中性',75:'贪婪',100:'极度贪婪'}[v]||''}},detail:{formatter:'{value}',fontSize:28,offsetCenter:[0,'60%'],color:lc,fontWeight:700},title:{offsetCenter:[0,'80%'],fontSize:14,color:lc,fontWeight:600},data:[{value:s.score,name:s.level}]}]})},rhi:function(){var el=this.$refs.hh;if(!el)return;var ch=echarts.init(el);ch.setOption({tooltip:{trigger:'axis',textStyle:{fontSize:12}},grid:{left:36,right:12,top:12,bottom:24},xAxis:{type:'category',data:this.hist.labels,boundaryGap:false,axisLabel:{fontSize:10}},yAxis:{type:'value',min:0,max:100,splitNumber:4,axisLabel:{fontSize:10}},visualMap:{show:false,pieces:[{lte:25,color:'#B71C1C'},{gt:25,lte:45,color:'#E53935'},{gt:45,lte:55,color:'#9E9E9E'},{gt:55,lte:75,color:'#43A047'},{gt:75,color:'#1B5E20'}]},series:[{type:'line',data:this.hist.scores,smooth:true,symbol:'none',lineWidth:2,areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(26,115,232,.25)'},{offset:1,color:'rgba(26,115,232,.02)'}])},markLine:{silent:true,data:[{yAxis:50,label:{formatter:'中性线',position:'end',fontSize:10},lineStyle:{type:'dashed',color:'#ccc'}}]}}]})}},mounted:function(){var self=this;Promise.all([API.sentCur(),API.sentHist()]).then(function(r){self.s=r[0];self.hist=r[1];self.$nextTick(function(){self.rg();s var ProfileView={template:'#tpl-profile',data:function(){return{form:{id:null,username:'',focusAreas:'[]',investmentStyle:'CONSERVATIVE',riskTolerance:'MEDIUM',investmentHorizon:'MEDIUM_TERM',analysisType:'MIXED',holdings:[]},sel:[],areas:['AI芯片','云计算','自动驾驶','大模型','机器人','量子计算','网络安全','SaaS','半导体设备','消费电子'],showAdd:false,nh:{stockCode:'',stockName:'',quantity:100,avgCost:0,sector:''},SM:SM}},methods:{ta2:function(a){var i=this.sel.indexOf(a);if(i>=0)this.sel.splice(i,1);else this.sel.push(a)},addH:function(){if(!this.nh.stockCode){alert('请输入股票代码');return}this.form.holdings.push(JSON.parse(JSON.stringify(this.nh)));this.nh={stockCode:'',stockName:'',quantity:100,avgCost:0,sector:''};this.showAdd=false},delH:function(i){this.form.holdings.splice(i,1)},save:function(){var self=this;self.form.focusAreas=JSON.stringify(self.sel);API.saveProfile(self.form).then(function(){alert('保存成功');self.$router.push('/')})}},mounted:function(){var self=this;API.profile(1).then(function(d){if(d){for(var k in d)if(d.hasOwnProperty(k))self.form[k]=d[k];if(!self.form.holdings)self.form.holdings=[];self.sel=pj(self.form.focusAreas)}})}};

  template:'#tpl-app',
  computed:{
    rt:function(){return this.$route.name},
    tt:function(){return(this.$route.meta&&this.$route.meta.title)||'华尔街之眼'},
