<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华尔街之眼 — 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#0a0e27;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-container{width:100%;max-width:420px;padding:20px}
.logo{text-align:center;margin-bottom:36px}
.logo h1{font-size:28px;color:#ffd700;letter-spacing:2px;margin-bottom:8px}
.logo p{font-size:14px;color:#8890b5}
.card{background:#151a40;border:1px solid #2a3070;border-radius:12px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.tabs{display:flex;margin-bottom:28px;border-bottom:1px solid #2a3070}
.tab-btn{flex:1;padding:12px 0;background:none;border:none;color:#8890b5;font-size:15px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.tab-btn.active{color:#ffd700;border-bottom-color:#ffd700}
.tab-btn:hover{color:#ffd700}
.form-panel{display:none}
.form-panel.active{display:block}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#8890b5;margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;background:#0a0e27;border:1px solid #2a3070;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#1A73E8}
.form-group input::placeholder{color:#4a5080}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1A73E8,#1565C0);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:16px;padding:10px 14px;border-radius:6px;font-size:13px;display:none}
.msg.error{display:block;background:rgba(229,57,53,.15);color:#ef5350;border:1px solid rgba(229,57,53,.3)}
.msg.success{display:block;background:rgba(0,200,167,.15);color:#00C9A7;border:1px solid rgba(0,200,167,.3)}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#4a5080}
.footer a{color:#1A73E8;text-decoration:none}
</style>
</head>
<body>
<div class="auth-container">
    <div class="logo">
        <h1>🏛️ 华尔街之眼</h1>
        <p>AI 投研情报引擎</p>
    </div>
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" onclick="switchTab('register')">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="panel-login" class="form-panel active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required minlength="3">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required minlength="6">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">登 录</button>
            </form>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- 注册表单 -->
        <div id="panel-register" class="form-panel">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="3~50个字符" required minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label>昵称（选填）</label>
                    <input type="text" id="regNickname" placeholder="给自己取个名字" maxlength="50">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位" required minlength="6">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required minlength="6">
                </div>
                <button type="submit" class="submit-btn" id="regBtn">注 册</button>
            </form>
            <div id="regMsg" class="msg"></div>
        </div>
    </div>
    <div class="footer">
        <p>登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
    </div>
</div>

<script>
function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    if (name === 'login') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('panel-login').classList.add('active');
    } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('panel-register').classList.add('active');
    }
    clearMessages();
}

function clearMessages() {
    document.getElementById('loginMsg').className = 'msg';
    document.getElementById('loginMsg').textContent = '';
    document.getElementById('regMsg').className = 'msg';
    document.getElementById('regMsg').textContent = '';
}

function showMsg(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'msg ' + type;
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
    clearMessages();

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('loginUsername').value.trim(),
                password: document.getElementById('loginPassword').value
            })
        });
        const data = await res.json();
        if (!res.ok) {
            showMsg('loginMsg', data.error || '登录失败', 'error');
            return;
        }
        // 存储登录信息
        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('nickname', data.nickname);
        showMsg('loginMsg', '登录成功，正在跳转...', 'success');
        setTimeout(() => {
            window.location.href = data.hasProfile ? '/index.html' : '/index.html';
        }, 500);
    } catch (err) {
        showMsg('loginMsg', '网络错误，请重试', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const pw = document.getElementById('regPassword').value;
    const pwc = document.getElementById('regPasswordConfirm').value;
    if (pw !== pwc) {
        showMsg('regMsg', '两次密码输入不一致', 'error');
        return;
    }

    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.textContent = '注册中...';
    clearMessages();

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('regUsername').value.trim(),
                password: pw,
                nickname: document.getElementById('regNickname').value.trim() || null
            })
        });
        const data = await res.json();
        if (!res.ok) {
            showMsg('regMsg', data.error || '注册失败', 'error');
            return;
        }
        // 注册成功自动登录
        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('nickname', data.nickname);
        showMsg('regMsg', '注册成功，正在跳转...', 'success');
        setTimeout(() => {
            window.location.href = '/index.html';
        }, 500);
    } catch (err) {
        showMsg('regMsg', '网络错误，请重试', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '注 册';
    }
}

// 如果已登录，直接跳转首页
if (localStorage.getItem('token')) {
    fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    }).then(r => {
        if (r.ok) window.location.href = '/index.html';
    });
}
</script>
</body>
</html>
