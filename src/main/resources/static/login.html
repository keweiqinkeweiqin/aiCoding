<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华尔街之眼 — 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#0a0e27;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-container{width:100%;max-width:420px;padding:20px}
.logo{text-align:center;margin-bottom:36px}
.logo h1{font-size:28px;color:#ffd700;letter-spacing:2px;margin-bottom:8px}
.logo p{font-size:14px;color:#8890b5}
.card{background:#151a40;border:1px solid #2a3070;border-radius:12px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card h2{text-align:center;font-size:18px;color:#e0e0e0;margin-bottom:24px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#8890b5;margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;background:#0a0e27;border:1px solid #2a3070;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#1A73E8}
.form-group input::placeholder{color:#4a5080}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1A73E8,#1565C0);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:16px;padding:10px 14px;border-radius:6px;font-size:13px;display:none}
.msg.error{display:block;background:rgba(229,57,53,.15);color:#ef5350;border:1px solid rgba(229,57,53,.3)}
.msg.success{display:block;background:rgba(0,200,167,.15);color:#00C9A7;border:1px solid rgba(0,200,167,.3)}
.hint{text-align:center;margin-top:16px;font-size:12px;color:#4a5080}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#4a5080}
.footer a{color:#1A73E8;text-decoration:none}
</style>
</head>
<body>
<div class="auth-container">
    <div class="logo">
        <h1>🏛️ 华尔街之眼</h1>
        <p>AI 投研情报引擎</p>
    </div>
    <div class="card">
        <h2>手机号登录</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required pattern="^1[3-9]\d{9}$" maxlength="11">
            </div>
            <div class="form-group">
                <label>昵称（选填，新用户可设置）</label>
                <input type="text" id="nickname" placeholder="不填则自动生成" maxlength="50">
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">登 录</button>
        </form>
        <p class="hint">未注册的手机号将自动创建账号</p>
        <div id="loginMsg" class="msg"></div>
    </div>
    <div class="footer">
        <p>登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
    </div>
</div>

<script>
function showMsg(text, type) {
    const el = document.getElementById('loginMsg');
    el.textContent = text;
    el.className = 'msg ' + type;
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
    document.getElementById('loginMsg').className = 'msg';

    const phone = document.getElementById('phone').value.trim();
    const nickname = document.getElementById('nickname').value.trim();

    const payload = { phone };
    if (nickname) payload.nickname = nickname;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (!res.ok || result.code !== 200) {
            showMsg(result.message || '登录失败', 'error');
            return;
        }
        const data = result.data;
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('phone', data.phone);
        localStorage.setItem('nickname', data.nickname || '');
        const tip = data.isNew ? '注册成功，正在跳转...' : '登录成功，正在跳转...';
        showMsg(tip, 'success');
        setTimeout(() => { window.location.href = '/index.html'; }, 500);
    } catch (err) {
        showMsg('网络错误，请重试', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
    }
}

// 已登录则跳转
const uid = localStorage.getItem('userId');
if (uid && uid !== '0') {
    fetch('/api/auth/me', { headers: { 'X-User-Id': uid } })
        .then(r => { if (r.ok) window.location.href = '/index.html'; });
}
</script>
</body>
</html>
