spring:
  application:
    name: wall-street-eye

  datasource:
    url: jdbc:h2:file:./data/wallstreet
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # Spring AI - Chat（LLM文本生成）
  ai:
    openai:
      api-key: sk-wpKbzykan-uFR6HCgW8rfwyBCGd-J0N2efi5B3B7qk4
      base-url: https://pre-aibrain-large-model-engine.hellobike.cn
      chat:
        options:
          model: GPT-5.4
          temperature: 0.3
          max-tokens: 2000
      embedding:
        enabled: false

server:
  port: 8080

# Embedding 单独配置（key不同）
embedding:
  api-url: https://pre-aibrain-large-model-engine.hellobike.cn/v1/embeddings
  api-key: sk-4N0tr8LQDwpHoQM5zu9SQl84kPBl3aLTz3HuMBu6MtQ
  model: Qwen-text-embedding-v4

# 数据采集配置
collector:
  market:
    licence: ${MAIRUI_LICENCE:}
