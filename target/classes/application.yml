spring:
  application:
    name: wall-street-eye

  datasource:
    url: jdbc:h2:file:./data/wallstreet
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # Spring AI - Chat（LLM文本生成）
  ai:
    openai:
      api-key: sk-wpKbzykan-uFR6HCgW8rfwyBCGd-J0N2efi5B3B7qk4
      base-url: https://pre-aibrain-large-model-engine.hellobike.cn
      chat:
        options:
          model: GPT-5.4
          temperature: 0.3
      embedding:
        enabled: false

server:
  port: 8080

